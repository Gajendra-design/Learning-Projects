<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <nav>
            <h1>Task Manager</h1>
            <div class="searchBar">
                <input type="text" placeholder="Search here...." id="searchInp">
                <button id="SearchBtn">Search</button>
            </div>
            <div class="navRight">
                <button id="createBtn" class="createBtn">Create Task</button>
                <button id="clearAll" class="clearAll">Clear All</button>
            </div>
        </nav>

        <section>
            <div class="task-container">
                <div class="task-container-header">
                    <h2>In Progress</h2>
                    <span id="totalInProgressTasks"></span>
                </div>
                <div id="inProgress"></div>
            </div>


            <div class="task-container dropZone">

                <div class="task-container-header">
                    <h2>Completed</h2>
                    <span id="totalCompletedTasks"></span>
                </div>
                <div id="Completed"></div>
            </div>
            </div>
        </section>

        <div id="formContainer" class="formContainer">
            <form action="">
                <div>
                    <label for="title">Task Title</label>
                    <input name="title" id="title" type="text" placeholder="Task Title" required>
                </div>

                <div>
                    <label for="description">Titile Description</label>
                    <input name="description" id="description" type="text" placeholder="Task Description" required>
                </div>

                <div>
                    <label for="priorityOptions">Task Priority</label>
                    <select name="priorityOptions" id="priorityOption" required>
                        <option value="" selected disabled>Task Priority</option>
                        <option value="imidiate">Imidiate</option>
                        <option value="important">Important</option>
                        <option value="delayble">Delayable</option>
                    </select>
                </div>

                <button id="addBtn" class="add"></button>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
