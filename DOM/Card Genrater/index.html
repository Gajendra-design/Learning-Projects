    <div class="formContainer">
        <form action="" id="addForm">
            <input id="imageURL" autocomplete="off" type="text" placeholder="Image URL" required>
            <input id="name" autocomplete="off" type="text" placeholder="name" required>
            <input id="email" autocomplete="off" type="email" placeholder="email" required>
            <input id="occupation" autocomplete="off" type="text" placeholder="Occupation" required>
            <button id="adding" class="add">Add</button>
        </form>

        <form action="" id="updateForm">
            <input type="text" id="cardId" hidden>
            <input id="updateimageURL" autocomplete="off" type="text" placeholder="Image URL" required>
            <input id="updatename" autocomplete="off" type="text" placeholder="name" required>
            <input id="updateemail" autocomplete="off" type="email" placeholder="email" required>
            <input id="updateoccupation" autocomplete="off" type="text" placeholder="Occupation" required>
