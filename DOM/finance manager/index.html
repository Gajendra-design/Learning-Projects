<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrack Pro - Personal Finance Tracker</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Top Navigation Bar -->
    <nav class="navbar">
        <div class="nav-logo">
            <span>📊</span> FinTrack Pro
        </div>
        <ul class="nav-links">
            <li><a id="link-dashboard" class="active" onclick="showPage('dashboard')">Dashboard</a></li>
            <li><a id="link-settings" onclick="showPage('settings')">Settings</a></li>
        </ul>
        <div class="nav-actions">
            <button class="btn btn-primary" onclick="openModal()">+ Add Transaction</button>
            <button class="btn btn-outline" id="auth-btn" onclick="toggleAuth()">Logout</button>
        </div>
    </nav>

    <!-- Main Content Container -->
    <main class="container">
        
        <!-- Dashboard View Section -->
        <section id="section-dashboard" class="page-section active">
            <h2 style="margin-bottom: 1.5rem;" id="welcome-msg">Welcome Back!</h2>
            
            <!-- Summary Metric Cards -->
            <div class="summary-grid">
                <div class="card balance">
                    <div class="card-title">Current Balance</div>
                    <div class="card-value" id="val-balance">$0.00</div>
                </div>
                <div class="card income">
                    <div class="card-title">Total Income</div>
                    <div class="card-value" id="val-income">$0.00</div>
                </div>
                <div class="card expense">
                    <div class="card-title">Total Expense</div>
                    <div class="card-value" id="val-expense">$0.00</div>
                </div>
                <div class="card transactions">
                    <div class="card-title">Total Transactions</div>
                    <div class="card-value" id="val-count">0</div>
                </div>
            </div>

            <!-- Visualization and Tabular Split Layout -->
            <div class="data-layout">
                <!-- Left Column: Visual Analytics Canvas -->
                <div class="card">
                    <h3 style="margin-bottom: 1rem;">Cash Flow Analysis</h3>
                    <div style="position: relative; height:300px; width:100%">
                        <canvas id="cashFlowChart"></canvas>
                    </div>
                </div>

                <!-- Right Column: Table List and Search Context -->
                <div>
                    <div class="table-controls">
                        <div class="filter-buttons">
                            <button class="filter-btn active" id="filter-all" onclick="setFilter('all')">All</button>
                            <button class="filter-btn" id="filter-income" onclick="setFilter('income')">Income</button>
                            <button class="filter-btn" id="filter-expense" onclick="setFilter('expense')">Expense</button>
                        </div>
                    </div>
                    
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Description</th>
                                    <th>Category</th>
                                    <th>Amount</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="transaction-rows">
                                <!-- Populated dynamically by JS engine -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>

        <!-- Settings Settings Panel -->
        <section id="section-settings" class="page-section">
            <h2 style="margin-bottom: 1.5rem;">User Configuration & Preferences</h2>
            <div class="settings-content">
                <div class="form-group">
                    <label for="settings-name">Display Name</label>
                    <input type="text" id="settings-name" class="form-control" placeholder="Enter your name">
                </div>
                <div class="form-group">
                    <label for="settings-currency">System Base Currency</label>
                    <select id="settings-currency" class="form-control">
                        <option value="USD">USD ($)</option>
                        <option value="EUR">EUR (€)</option>
                        <option value="GBP">GBP (£)</option>
                        <option value="INR">INR (₹)</option>
                        <option value="JPY">JPY (¥)</option>
                    </select>
                </div>
                <div class="form-group" style="display: flex; align-items: center; gap: 1rem; margin: 2rem 0;">
                    <label for="settings-darkmode" style="margin-bottom: 0; cursor: pointer;">Enable Dark Palette Interface</label>
                    <input type="checkbox" id="settings-darkmode" style="width: 18px; height: 18px; cursor: pointer;" onchange="handleDarkToggle(this.checked)">
                </div>
                <div style="display: flex; gap: 1rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
                    <button class="btn btn-primary" onclick="saveSettings()">Save Configuration</button>
                    <button class="btn btn-danger" onclick="triggerSystemReset()">Reset Global Storage</button>
                </div>
            </div>
        </section>

    </main>

    <!-- Modal Transaction Management Overlay -->
    <div class="modal-overlay" id="transaction-modal" onclick="closeModalViaOverlay(event)">
        <div class="modal-box">
            <div class="modal-header">
                <h3 class="modal-title">Record Flow Event</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <form id="transaction-form" onsubmit="handleFormSubmission(event)">
                <div class="form-group">
                    <label for="tx-type">Transaction Vector</label>
                    <select id="tx-type" class="form-control" required>
                        <option value="income">Income (+)</option>
                        <option value="expense">Expense (-)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="tx-desc">Description</label>
                    <input type="text" id="tx-desc" class="form-control" placeholder="e.g. Weekly Grocery Run" required>
                </div>
                <div class="form-group">
                    <label for="tx-amount">Amount Value</label>
                    <input type="number" id="tx-amount" step="0.01" min="0.01" class="form-control" placeholder="0.00" required>
                </div>
                <div class="form-group">
                    <label for="tx-date">Calendar Date</label>
                    <input type="date" id="tx-date" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="tx-category">Target Category Allocator</label>
                    <select id="tx-category" class="form-control" required>
                        <option value="Food & Dining">Food & Dining</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Recharge & Bills">Recharge & Bills</option>
                        <option value="Petrol & Auto">Petrol & Auto</option>
                        <option value="Utilities">Utilities</option>
                        <option value="Salary">Salary</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Commit Registry</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
