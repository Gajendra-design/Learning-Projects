<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Click</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <div class="gameInfo">
            <div>Time: <span class="time">5</span></div>
            <div>High Score: <span class="highscore"></span></div>
            <div>Score: <span class="score">0</span></div>
        </div>
        <div class="container"></div>
        <button>Start</button>
    </main>

    <div class="gameOver">
        <div>
            <h1>Game Over</h1>
            <div class="scoreInfo">
                <div>Highscore: <span id="finalHighScore"></span></div>
                <div>Your score: <span id="finalScore"></span></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
